name: Gemini
description: Google's Gemini API provides access to state-of-the-art generative 
  AI models for text generation, multimodal understanding, code generation, and 
  more.
image: 
  https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690345.svg
tags:
  - artificial intelligence
  - generative ai
  - large language models
  - multimodal
  - machine learning
  - image generation
  - video generation
  - embeddings
  - function calling
  - agents
  - text-to-speech
  - document understanding
  - audio understanding
  - video understanding
  - deep research
  - batch processing
  - structured output
created: '2024'
modified: '2026-03-03'
url: https://ai.google.dev/
apis:
  - name: Gemini REST API
    description: >-
      REST API for accessing Gemini models for text generation, chat, embeddings,
      and multimodal tasks.
