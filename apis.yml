  - name: Gemini Live API
    description: Low-latency bidirectional streaming API enabling real-time 
      voice and video interactions with Gemini models over WebSocket 
      connections.
    humanURL: https://ai.google.dev/gemini-api/docs/live
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - real-time
      - streaming
      - websocket
      - voice
      - video
      - live
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/live
