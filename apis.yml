      https://www.gstatic.com/lamda/images/gemini_sparkle_v002_d4735304ff6292a690345.svg
    humanURL: https://ai.google.dev/api
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - rest
      - generative ai
      - chat
      - text generation
      - embeddings
      - multimodal
      - streaming
    properties:
      - type: Documentation
        url: https://ai.google.dev/api/rest
