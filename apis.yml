        url: https://ai.google.dev/gemini-api/docs/live-tools
  - name: Gemini Interactions API
    description: Unified interface for interacting with Gemini models and 
      agents, simplifying state management, tool orchestration, and long-running
      tasks as an improved alternative to generateContent.
    humanURL: https://ai.google.dev/gemini-api/docs/interactions
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - agents
      - interactions
      - state management
      - tool orchestration
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/interactions
  - name: Gemini Image Generation API
    description: Image generation capabilities through the Gemini API, 
      supporting text-to-image generation, image editing, and multi-turn 
      conversational editing.
    humanURL: https://ai.google.dev/gemini-api/docs/image-generation
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - image generation
      - text-to-image
      - image editing
      - generative ai
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/image-generation
  - name: Gemini Video Generation API
    description: Video generation capabilities through the Gemini API powered by
      Veo, supporting text-to-video and image-to-video generation in resolutions
      up to 4K.
    humanURL: https://ai.google.dev/gemini-api/docs/video
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - video generation
      - text-to-video
      - image-to-video
      - veo
      - generative ai
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/video
  - name: Gemini Text-to-Speech API
    description: Native audio generation text-to-speech capabilities through the
      Gemini API, supporting single and multi-speaker speech synthesis with 
      natural language control over style, accent, pace, and tone.
    humanURL: https://ai.google.dev/gemini-api/docs/speech-generation
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - text-to-speech
      - tts
      - audio generation
      - speech synthesis
      - multi-speaker
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/speech-generation
  - name: Gemini Files API
    description: API for uploading and managing media files for use with Gemini 
      models, supporting images, audio, video, and documents up to 2 GB per file
      with 20 GB per project storage.
    humanURL: https://ai.google.dev/gemini-api/docs/files
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - files
      - upload
      - media
      - documents
      - storage
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/files
      - type: API Reference
        url: https://ai.google.dev/api/files
      - type: File Input Methods
        url: https://ai.google.dev/gemini-api/docs/file-input-methods
  - name: Gemini Embeddings API
    description: Text embedding capabilities through the Gemini API, generating 
      vector representations for semantic search, classification, clustering, 
      and retrieval augmented generation (RAG) applications.
    humanURL: https://ai.google.dev/gemini-api/docs/embeddings
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - embeddings
      - text embeddings
      - semantic search
      - vector search
      - rag
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/embeddings
      - type: Model Card
        url: https://ai.google.dev/gemini-api/docs/models/gemini-embedding-001
  - name: Gemini Batch API
    description: Asynchronous batch processing API for submitting large volumes 
      of Gemini API requests at 50 percent of the standard cost, with support 
      for content generation, embeddings, and OpenAI compatibility.
    humanURL: https://ai.google.dev/gemini-api/docs/batch-api
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - batch
      - asynchronous
      - bulk processing
      - cost optimization
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/batch-api
  - name: Gemini Deep Research API
    description: Agentic research capability powered by the Interactions API 
      that autonomously plans, executes, and synthesizes multi-step research 
      tasks using web search and URL context to produce detailed cited reports.
    humanURL: https://ai.google.dev/gemini-api/docs/deep-research
    baseURL: https://generativelanguage.googleapis.com
    tags:
      - deep research
      - agents
      - research
      - web search
      - reports
    properties:
      - type: Documentation
        url: https://ai.google.dev/gemini-api/docs/deep-research
